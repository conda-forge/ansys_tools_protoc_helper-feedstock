{% set name = "ansys_tools_protoc_helper" %}
{% set version = "0.7.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: ad3bc22900dd767bd7170ccca7b73be7b84ac0d209e47d1c35f9e7e2b6808c18

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.2,<4
    - pip
  run:
    - python >={{ python_min }},<3.15
    - setuptools >=42.0
    - grpcio-tools ==1.71.0
    - protobuf ==5.29.4
    - mypy-protobuf ==3.5.0

test:
  imports:
    - ansys.tools.protoc_helper
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/ansys-tools-protoc-helper/
  summary: A utility for compiling '.proto' files to Python source.
  dev_url: https://github.com/ansys/ansys-tools-protoc-helper
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - SMoraisAnsys
    - MaxJPRey
    - jorgepiloto
    - RobPasMue
