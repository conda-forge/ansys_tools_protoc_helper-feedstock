{% set name = "ansys_tools_protoc_helper" %}
{% set version = "0.6.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 36875ea5f2e58aa7ec8f2999509540885b9a21782e03ede60ec0ef560b527320

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.2,<4
    - pip
  run:
    - python >={{ python_min }},<3.13
    - setuptools >=42.0,<82.0
    - grpcio-tools ==1.59.5
    - protobuf ==4.24.4
    - mypy-protobuf ==3.1.0

test:
  imports:
    - ansys.tools.protoc_helper
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/ansys-tools-protoc-helper/
  summary: A utility for compiling '.proto' files to Python source.
  dev_url: https://github.com/ansys/ansys-tools-protoc-helper
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - SMoraisAnsys
    - MaxJPRey
    - jorgepiloto
    - RobPasMue
